<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Index - Simple Calculator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f4f4fb; 
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Arial, sans-serif;
        }

        .calculator-card {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 450px;
            padding: 40px;
        }

        .title {
            font-weight: 700;
            color: #333;
            margin-bottom: 5px;
        }

        .trainer-name {
            color: #777;
            font-size: 0.9rem;
            margin-bottom: 25px;
        }

        label {
            font-weight: 600;
            color: #555;
            margin-bottom: 8px;
        }

        .form-control {
            border: 1px solid #ddd;
            padding: 10px;
            margin-bottom: 20px;
            border-radius: 6px;
        }

        .btn-calc {
            color: white;
            border: none;
            padding: 12px;
            border-radius: 6px;
            font-weight: 500;
            transition: opacity 0.2s;
        }

        .btn-calc:hover {
            opacity: 0.9;
            color: white;
        }

        .bg-add { background-color: #5cb85c; }     
        .bg-sub { background-color: #2b98f0; }     
        .bg-mul { background-color: #f0ad4e; }     
        .bg-div { background-color: #f04e4e; }      

        .result-container {
            background-color: #ebf1f5;
            border-radius: 8px;
            padding: 20px;
            margin-top: 30px;
            text-align: center;
        }

        .result-label {
            color: #666;
            font-weight: 600;
            display: block;
            margin-bottom: 5px;
        }

        .result-equation {
            font-size: 1.4rem;
            font-weight: 800;
            color: #222;
            margin: 0;
        }
    </style>
</head>
<body>

<div class="calculator-card text-center">
    <h3 class="title">Simple Calculator</h3>
    <p class="trainer-name">Made By Karan</p>

    <div class="text-start">
        <label>First Number (Integer)</label>
        <input type="number" id="num1" class="form-control" placeholder="Enter first number">

        <label>Second Number (Integer)</label>
        <input type="number" id="num2" class="form-control" placeholder="Enter second number">
    </div>

    <div class="row g-2 mt-2">
        <div class="col-6">
            <button class="btn btn-calc bg-add w-100" onclick="calc('+')">Add</button>
        </div>
        <div class="col-6">
            <button class="btn btn-calc bg-sub w-100" onclick="calc('-')">Subtract</button>
        </div>
        <div class="col-6">
            <button class="btn btn-calc bg-mul w-100" onclick="calc('*')">Multiply</button>
        </div>
        <div class="col-6">
            <button class="btn btn-calc bg-div w-100" onclick="calc('/')">Division</button>
        </div>
    </div>

    <div class="result-container">
        <span class="result-label">Calculated Result</span>
        <p id="resultDisplay" class="result-equation">---</p>
    </div>
</div>

<script>
    function calc(operator) {
        const n1 = parseFloat(document.getElementById('num1').value);
        const n2 = parseFloat(document.getElementById('num2').value);
        const display = document.getElementById('resultDisplay');

        if (isNaN(n1) || isNaN(n2)) {
            display.innerText = "Please enter numbers";
            return;
        }

        let result;
        let symbol;

        switch(operator) {
            case '+': 
                result = n1 + n2; 
                symbol = "+";
                break;
            case '-': 
                result = n1 - n2; 
                symbol = "-";
                break;
            case '*': 
                result = n1 * n2; 
                symbol = "×";
                break;
            case '/': 
                symbol = "÷";
                result = n2 !== 0 ? (n1 / n2) : "Cannot divide by 0";
                break;
        }
        if (typeof result === 'number') {
            display.innerText = `${n1} ${symbol} ${n2} = ${result}`;
        } else {
            display.innerText = result; // For division by zero error
        }
    }
</script>

</body>
</html>
